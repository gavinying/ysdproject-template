name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools via mise
        uses: jdx/mise-action@v2
        with:
          version: latest
          install: true

      - name: Cache pre-commit hooks
        uses: actions/cache@v3
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  validate-sops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tools via mise
        uses: jdx/mise-action@v2
      
      - name: Validate .sops.yaml syntax
        run: sops --config .sops.yaml .env.example 2>/dev/null || true # Just checking if sops runs without crashing on config
        # Better check: ensure sops can read the config
        
      - name: Check Makefile syntax
        run: make -n setup
